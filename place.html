<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="A responsive place page featuring Nigeria with weather and local information.">

    <meta name="author" content="Ifeoluwa Olalekan">

    <title>Place Page - Nigeria</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/place.css">

    <link rel="stylesheet" href="styles/place-large.css">

    <!-- JavaScript -->
    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Nigeria</h1>
    </header>

    <!-- HERO IMAGE -->
    <picture>
        <source srcset="images/hero-large.webp" media="(min-width: 768px)">

        <img src="images/hero-small.webp" alt="Beautiful landscape view of Nigeria" class="hero">
    </picture>

    <main>

        <!-- DATA SECTION -->
        <section class="card">
            <h2>Data</h2>

            <p><strong>Area:</strong> 923,768 km²</p>
            <p><strong>Population:</strong> 223 Million</p>
            <p><strong>Capital:</strong> Abuja</p>
            <p><strong>Languages:</strong> English, Yoruba, Hausa, Igbo</p>
            <p><strong>Currency:</strong> Naira</p>
            <p><strong>Time Zone:</strong> UTC +1</p>
        </section>

        <!-- WEATHER SECTION -->
        <section class="card weather">

            <h2>Weather</h2>

            <!-- Mobile SVG Icon -->
            <img src="images/weather.svg" alt="Weather Icon" class="weather-icon">

            <p><strong>Temperature:</strong> <span id="temp">8</span>°C</p>

            <p><strong>Wind Speed:</strong> <span id="speed">10</span> km/h</p>

            <p><strong>Wind Chill:</strong> <span id="windchill"></span></p>

        </section>

    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> | Ifeoluwa Olalekan | Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>

</html>
