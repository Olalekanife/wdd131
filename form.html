<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Submit a product review form with ratings, installation details, useful features, and customer feedback.">

    <meta name="author" content="Ifeoluwa Olalekan">

    <title>Product Review Form</title>

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/form.css">

    <!-- JS -->
    <script src="scripts/form.js" defer></script>

</head>

<body>

    <header>

        <h1>Product Review Form</h1>

    </header>

    <main>

        <form method="get" action="review.html">

            <!-- PRODUCT NAME -->
            <label for="productName">Product Name</label>

            <select id="productName" name="productName" required>

                <option value="" disabled selected>
                    Select a Product ...
                </option>

            </select>

            <!-- OVERALL RATING -->
            <fieldset>

                <legend>Overall Rating</legend>

                <div class="rating-group">

                    <input type="radio" id="star1" name="rating" value="1" required>

                    <label for="star1">☆</label>

                    <input type="radio" id="star2" name="rating" value="2" required>

                    <label for="star2">☆☆</label>

                    <input type="radio" id="star3" name="rating" value="3" required>

                    <label for="star3">☆☆☆</label>

                    <input type="radio" id="star4" name="rating" value="4" required>

                    <label for="star4">☆☆☆☆</label>

                    <input type="radio" id="star5" name="rating" value="5" required>

                    <label for="star5">☆☆☆☆☆</label>

                </div>

            </fieldset>

            <!-- DATE -->
            <label for="installDate">
                Date of Installation
            </label>

            <input type="date" id="installDate" name="installDate" required>

            <!-- FEATURES -->
            <fieldset>

                <legend>Useful Features</legend>

                <div class="checkbox-group">

                    <input type="checkbox" id="durability" name="features" value="Durability">

                    <label for="durability">
                        Durability
                    </label>

                    <input type="checkbox" id="ease" name="features" value="Ease of Use">

                    <label for="ease">
                        Ease of Use
                    </label>

                    <input type="checkbox" id="performance" name="features" value="Performance">

                    <label for="performance">
                        Performance
                    </label>

                    <input type="checkbox" id="design" name="features" value="Design">

                    <label for="design">
                        Design
                    </label>

                </div>

            </fieldset>

            <!-- REVIEW -->
            <label for="review">
                Written Review (Optional)
            </label>

            <textarea id="review" name="review" rows="5"></textarea>

            <!-- USERNAME -->
            <label for="username">
                Your Name (Optional)
            </label>

            <input type="text" id="username" name="username">

            <!-- SUBMIT -->
            <input type="submit" value="Submit Review" class="submit-btn">

        </form>

    </main>

    <footer>

        <p>
            &copy; <span id="year"></span> | Ifeoluwa Olalekan | Nigeria
        </p>

        <p id="lastModified"></p>

    </footer>

</body>

</html>
