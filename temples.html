<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Responsive temple album page built with HTML, CSS, and JavaScript for WDD131.">

    <meta name="author" content="Ifeoluwa Olalekan">

    <title>Temple Album</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">

    <!-- JavaScript -->
    <script src="scripts/temples.js" defer></script>
</head>

<body>

    <header>
        <div class="header-content">
            <p class="logo">Temple Album</p>

            <button id="menuBtn" aria-label="Menu Button">☰</button>

            <nav id="navMenu">
                <a href="#">Home</a>
                <a href="#">Old</a>
                <a href="#">New</a>
                <a href="#">Large</a>
                <a href="#">Small</a>
            </nav>
        </div>
    </header>

    <main>
        <h1>Temple Album</h1>

        <section class="gallery">

            <figure>
                <img src="images/temple1.webp" alt="Salt Lake Temple exterior view">
                <figcaption>Salt Lake Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple2.webp" alt="Tokyo Japan Temple at sunset">
                <figcaption>Tokyo Japan Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple3.webp" alt="Rome Italy Temple with gardens">
                <figcaption>Rome Italy Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple4.webp" alt="Accra Ghana Temple daytime view">
                <figcaption>Accra Ghana Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple5.webp" alt="Aba Nigeria Temple exterior">
                <figcaption>Aba Nigeria Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple6.webp" alt="Paris France Temple with cloudy sky">
                <figcaption>Paris France Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple7.webp" alt="Mexico City Temple at night">
                <figcaption>Mexico City Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple8.webp" alt="Sydney Australia Temple entrance">
                <figcaption>Sydney Australia Temple</figcaption>
            </figure>

            <figure>
                <img src="images/temple9.webp" alt="Johannesburg South Africa Temple">
                <figcaption>Johannesburg South Africa Temple</figcaption>
            </figure>

        </section>
    </main>

    <footer>
        <p>
            &copy; <span id="year"></span> | Ifeoluwa Olalekan | Nigeria
        </p>

        <p id="lastModified"></p>
    </footer>

</body>

</html>
